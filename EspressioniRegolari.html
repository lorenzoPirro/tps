<!DOCTYPE html>
<html>
<head>
  <title>Anagrafica 4.0</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    table {
      border-radius: 8px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <input type="text" id="nome">
  Nome <br>

  <input type="text" id="cognome">
  Cognome <br>

  <input type="text" id="citta">
  Città <br>

  <input type="text" id="CAP">
  CAP <br>

  <input type="text" id="Email">
  Email <br>

  <input type="text" id="telefono">
  Telefono <br>

  <input type="button" value="Inserisci" onclick="ana()">

  <script>

    let elementi = JSON.parse(localStorage.getItem("elenco")) || [];

    function ana() {

      let nome = document.getElementById("nome").value;
      let cognome = document.getElementById("cognome").value;
      let citta = document.getElementById("citta").value;
      let CAP = document.getElementById("CAP").value;
      let Email = document.getElementById("Email").value;
      let telefono = document.getElementById("telefono").value;

      let regexNome = /^[A-Za-z]+$/;
      let regexCognome = /^[\p{Script=Latin}]+$/u;
      let regexCitta = /^[A-Za-z]+$/;
      let regexCAP = /^[0-9]{5}$/;
      let regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      let regexTelefono = /^[0-9]{8,15}$/;

      if(!regexNome.test(nome)){
        alert("Il nome deve contenere solo lettere");
        return;
      }

      if(!regexCognome.test(cognome)){
        alert("Il cognome deve contenere solo lettere");
        return;
      }

      if(!regexCitta.test(citta)){
        alert("La città deve contenere solo lettere");
        return;
      }

      if(!regexCAP.test(CAP)){
        alert("Il CAP deve avere 5 numeri");
        return;
      }

      if(!regexEmail.test(Email)){
        alert("Email non valida");
        return;
      }

      if(!regexTelefono.test(telefono)){
        alert("Numero di telefono non valido");
        return;
      }

      const persone = {
        nome: nome,
        cognome: cognome,
        citta: citta,
        CAP: CAP,
        Email: Email,
        telefono: telefono
      };

      elementi.push(persone);

      localStorage.setItem("elenco", JSON.stringify(elementi));

      location.reload();
    }

  </script>

  <table border="1">
    <tr>
      <th>Nome</th>
      <th>Cognome</th>
      <th>Città</th>
      <th>CAP</th>
      <th>Email</th>
      <th>Telefono</th>
    </tr>

    <tbody id="cont"></tbody>
  </table>

  <script>

    let cont = document.getElementById("cont");

    let s = JSON.parse(localStorage.getItem("elenco")) || [];

    for (let i = 0; i < s.length; i++) {

      let tr = document.createElement("tr");

      tr.innerHTML =
        "<td>" + s[i].nome + "</td>" +
        "<td>" + s[i].cognome + "</td>" +
        "<td>" + s[i].citta + "</td>" +
        "<td>" + s[i].CAP + "</td>" +
        "<td>" + s[i].Email + "</td>" +
        "<td>" + s[i].telefono + "</td>";

      cont.appendChild(tr);
    }

  </script>

</body>
</html>
