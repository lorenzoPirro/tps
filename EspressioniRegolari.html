<!DOCTYPE html>
<html>
<head>
  <title>Anagrafica 4.0</title>
  <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
        }

        table {
            border-radius: 8px;
            margin-top: 15px;
        }

        th {
        }
    </style>
</head>

<body>

  <input type="text" id="nome">
  Nome <br>

  <input type="text" id="cognome">
  cognome <br>

  <input type="number" id="citta">
  eta <br>

  <input type="text" id="CAP">
  citta <br>

  <input type="text" id="E-mail">
  provincia <br>

  <input type="text" id="telefono">
  nazione <br>

  <input type="button" value="inserisci" onclick="ana()">

  <script>
    let elementi = [];
    function ana() {
      let nome = document.getElementById("nome").value;
      let cognome = document.getElementById("cognome").value;
      let citta = document.getElementById("citta").value;
      let CAP = document.getElementById("CAP").value;
      let Email = document.getElementById("Email").value;
       let telefono = document.getElementById("telefono").value;

      const persone = {};
      persone.nome = nome;
      persone.cognome = cognome;
      persone.citta = citta;
      persone.CAP = CAP;
      persone.E-mail = E-mail;
      persone.telefono = telefono;

      elementi.push(persone);
      localStorage.setItem("elenco", JSON.stringify(elementi));
    }
  </script>

  <table border="1">
    <tr>
      <th>Nome</th>
      <th>Cognome</th>
      <th>Città</th>
       <th>CAP</th>
      <th>Email</th>
      <th>Telefono</th>
    </tr>
    <tbody id="cont"></tbody>
  </table>

  <script>
    let cont = document.getElementById("cont");
    let s = JSON.parse(localStorage.getItem("elenco"));

    for (let i = 0; i < s.length; i++) {
      let tr = document.createElement("tr");

      tr.innerHTML =
        "<td>" + s[i].nome + "</td>" +
        "<td>" + s[i].cognome + "</td>" +
        "<td>" + s[i].citta + "</td>" +
         "<td>" + s[i].CAP + "</td>" +
        "<td>" + s[i].Email + "</td>" +
        "<td>" + s[i].telefono + "</td>";

      cont.appendChild(tr);
    }
  </script>

</body>
</html>
